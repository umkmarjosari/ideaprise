name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every 3rd day of the month (e.g. 1st, 4th, 7th, etc.)
    # Note: GitHub Actions schedule can sometimes be delayed, but this is frequent enough.
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-database:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' # Or match your project's version
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary python-dotenv

    - name: Ping Supabase Database
      env:
        # We read the secret from GitHub Secrets.
        # You need to add DATABASE_URL to your GitHub repository secrets!
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python ping_db.py
